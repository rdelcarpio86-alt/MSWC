<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Monitor Pro - Inmersivo</title>
    <style>
        :root {
            --cctv-green: #00ff41;
            --cctv-red: #ff0000;
            --ui-bg: rgba(0, 0, 0, 0.9);
            --ui-border: 1px solid var(--cctv-green);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: var(--cctv-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            text-transform: uppercase;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
        }

        video#webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            /* Volvemos a cover para que llene la pantalla sin franjas */
            object-fit: cover;
            filter: grayscale(0.2) contrast(1.1) brightness(0.9);
            will-change: transform;
        }

        /* Capas de Efecto */
        .noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 5;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 6;
        }

        /* Interfaz de Usuario */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            padding: 30px;
            box-sizing: border-box;
            z-index: 10;
        }

        .rec-status {
            position: absolute;
            top: 30px; left: 40px;
            display: none;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .rec-status.active { display: flex; }

        .dot {
            width: 15px; height: 15px;
            background-color: var(--cctv-red);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        .timestamp {
            position: absolute;
            top: 30px; right: 40px;
            font-size: 1.2rem;
            text-shadow: 2px 2px 2px #000;
            text-align: right;
        }

        .controls-panel {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: var(--ui-bg);
            padding: 12px 25px;
            border: var(--ui-border);
            border-radius: 50px;
            z-index: 20;
            pointer-events: all;
            backdrop-filter: blur(8px);
        }

        .control-btn {
            background: transparent;
            border: 1px solid var(--cctv-green);
            color: var(--cctv-green);
            padding: 8px 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border-radius: 20px;
        }

        .control-btn:hover { background: var(--cctv-green); color: #000; }
        .control-btn.recording { border-color: var(--cctv-red); color: var(--cctv-red); animation: pulse-border 1.5s infinite; }

        /* Modales */
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--ui-bg);
            border: 2px solid var(--cctv-green);
            padding: 25px;
            z-index: 200;
            display: none;
            flex-direction: column;
            gap: 15px;
            min-width: 320px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
            backdrop-filter: blur(15px);
        }

        .modal input, .modal select {
            background: #000;
            border: 1px solid var(--cctv-green);
            color: var(--cctv-green);
            padding: 12px;
            font-family: inherit;
            outline: none;
            font-size: 1rem;
        }

        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px rgba(255, 0, 0, 0.4); }
            100% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
        }

        #flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 100;
            transition: opacity 0.15s ease-out;
        }

        .error-msg {
            position: absolute;
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border: 2px solid var(--cctv-red);
            color: var(--cctv-red);
            display: none;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        
        <div id="flash"></div>
        <div class="noise"></div>
        <div class="scanlines"></div>

        <div class="overlay">
            <div id="rec-indicator" class="rec-status">
                <div class="dot"></div>
                <span>REC <span id="rec-timer">00:00</span></span>
            </div>
            
            <div id="clock" class="timestamp">00/00/0000<br>00:00:00</div>
        </div>

        <div class="controls-panel">
            <button id="snap-btn" class="control-btn">FOTO</button>
            <button id="record-btn" class="control-btn"><span>GRABAR</span></button>
            <button id="settings-btn" class="control-btn">⚙️</button>
        </div>

        <!-- Modal de Guardado -->
        <div id="save-modal" class="modal">
            <div style="font-weight: bold;">GUARDAR ARCHIVO</div>
            <input type="text" id="filename-input" placeholder="Nombre del archivo...">
            <div class="modal-buttons">
                <button class="control-btn" id="modal-cancel">DESCARTAR</button>
                <button class="control-btn" id="modal-save">DESCARGAR</button>
            </div>
        </div>

        <!-- Modal de Configuración Inicial -->
        <div id="config-modal" class="modal">
            <div style="font-weight: bold; letter-spacing: 2px;">CONFIGURACIÓN DE ENTRADA</div>
            
            <label style="font-size: 0.7rem;">IP O URL DE VIDEO (STREAM):</label>
            <input type="text" id="ip-input" placeholder="http://192.168.1.50:8080/video">
            
            <label style="font-size: 0.7rem;">O SELECCIONAR CÁMARA LOCAL:</label>
            <select id="camera-select">
                <option value="">Detectando cámaras...</option>
            </select>

            <div class="modal-buttons">
                <button class="control-btn" id="config-close">OMITIR</button>
                <button class="control-btn" id="config-apply" style="background: var(--cctv-green); color: #000;">CONECTAR</button>
            </div>
        </div>

        <div id="error" class="error-msg">
            <div style="font-size: 1.5rem; margin-bottom: 10px;">⚠️ ERROR DE SEÑAL ⚠️</div>
            <p id="error-text">CONEXIÓN FALLIDA O PERMISO DENEGADO.</p>
            <button class="control-btn" onclick="location.reload()" style="margin: 0 auto;">REINTENTAR</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const clockElement = document.getElementById('clock');
        const errorElement = document.getElementById('error');
        const errorText = document.getElementById('error-text');
        const container = document.getElementById('container');
        const flash = document.getElementById('flash');
        const recordBtn = document.getElementById('record-btn');
        const snapBtn = document.getElementById('snap-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const recIndicator = document.getElementById('rec-indicator');
        const recTimer = document.getElementById('rec-timer');
        
        const saveModal = document.getElementById('save-modal');
        const filenameInput = document.getElementById('filename-input');
        const configModal = document.getElementById('config-modal');
        const ipInput = document.getElementById('ip-input');
        const cameraSelect = document.getElementById('camera-select');

        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let startTime;
        let timerInterval;
        let pendingBlob = null;
        let pendingType = ''; 

        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let lastMouseX, lastMouseY;

        // --- RELOJ ---
        function getFormattedTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('es-ES', { hour12: false });
            return { dateStr, timeStr };
        }

        function updateClock() {
            const time = getFormattedTime();
            clockElement.innerHTML = `${time.dateStr}<br>${time.timeStr}`;
        }

        // --- CONFIGURACIÓN ---
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') toggleConfig();
        });

        settingsBtn.onclick = toggleConfig;

        function toggleConfig() {
            if (configModal.style.display === 'flex') closeConfig();
            else openConfig();
        }

        async function openConfig() {
            configModal.style.display = 'flex';
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                cameraSelect.innerHTML = videoDevices.map(device => 
                    `<option value="${device.deviceId}">${device.label || 'Cámara ' + (cameraSelect.length + 1)}</option>`
                ).join('');
            } catch (err) {
                cameraSelect.innerHTML = '<option value="">No se detectaron cámaras</option>';
            }
        }

        function closeConfig() {
            configModal.style.display = 'none';
        }

        document.getElementById('config-close').onclick = closeConfig;
        
        document.getElementById('config-apply').onclick = async () => {
            const ipValue = ipInput.value.trim();
            const cameraId = cameraSelect.value;

            if (ipValue) {
                video.srcObject = null;
                video.src = ipValue;
                video.onerror = () => {
                    errorText.innerText = "FALLO AL CARGAR STREAM: " + ipValue;
                    errorElement.style.display = 'block';
                };
            } else if (cameraId) {
                video.src = "";
                await startCamera(cameraId);
            }
            closeConfig();
        };

        // --- ZOOM Y PAN ---
        function updateTransform() {
            const containerW = container.clientWidth;
            const containerH = container.clientHeight;
            const maxOffX = (containerW * (scale - 1)) / 2;
            const maxOffY = (containerH * (scale - 1)) / 2;
            offsetX = Math.max(-maxOffX, Math.min(maxOffX, offsetX));
            offsetY = Math.max(-maxOffY, Math.min(maxOffY, offsetY));
            video.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        }

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const oldScale = scale;
            if (e.deltaY < 0) scale = Math.min(scale + 0.25, 10);
            else scale = Math.max(1, scale - 0.25);
            if (scale !== oldScale) updateTransform();
        }, { passive: false });

        container.addEventListener('mousedown', (e) => {
            if (scale > 1) {
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            offsetX += (e.clientX - lastMouseX);
            offsetY += (e.clientY - lastMouseY);
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => isDragging = false);

        // --- PROCESAMIENTO CANVAS (DIBUJO) ---
        function drawToCanvas(targetCanvas) {
            const ctx = targetCanvas.getContext('2d', { alpha: false });
            const cw = targetCanvas.width;
            const ch = targetCanvas.height;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, cw, ch);
            ctx.save();
            
            // Aplicar transformaciones de Zoom/Pan
            ctx.translate(cw / 2, ch / 2);
            const ratioX = cw / container.clientWidth;
            const ratioY = ch / container.clientHeight;
            ctx.translate(offsetX * ratioX, offsetY * ratioY);
            ctx.scale(scale, scale);
            ctx.translate(-cw / 2, -ch / 2);
            
            const vW = video.videoWidth || cw;
            const vH = video.videoHeight || ch;
            const videoRatio = vW / vH;
            const canvasRatio = cw / ch;
            
            let dW, dH, dX, dY;
            // Para el dibujo del archivo, usamos "cover" para que coincida con lo que el usuario ve en pantalla
            if (videoRatio > canvasRatio) {
                dH = ch; dW = ch * videoRatio; dX = (cw - dW) / 2; dY = 0;
            } else {
                dW = cw; dH = cw / videoRatio; dX = 0; dY = (ch - dH) / 2;
            }
            
            ctx.drawImage(video, dX, dY, dW, dH);
            ctx.restore();

            // Sello de tiempo en el archivo
            const time = getFormattedTime();
            const padding = cw * 0.03;
            const fontSize = Math.max(20, Math.floor(cw * 0.025));
            ctx.font = `bold ${fontSize}px "Courier New", monospace`;
            ctx.fillStyle = "#00ff41";
            ctx.textAlign = "right";
            ctx.shadowColor = "black"; ctx.shadowBlur = 6;
            ctx.fillText(time.dateStr, cw - padding, padding + fontSize);
            ctx.fillText(time.timeStr, cw - padding, padding + fontSize * 2.2);
        }

        // --- FOTO Y VIDEO ---
        snapBtn.onclick = () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1920;
            canvas.height = video.videoHeight || 1080;
            drawToCanvas(canvas);
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 150);
            openSaveModal(canvas.toDataURL('image/jpeg', 0.9), 'foto');
        };

        recordBtn.onclick = () => {
            if (!isRecording) startRecording();
            else stopRecording();
        };

        function startRecording() {
            recordedChunks = [];
            const recordingCanvas = document.createElement('canvas');
            recordingCanvas.width = 1280; recordingCanvas.height = 720;
            const renderLoop = () => { if (isRecording) { drawToCanvas(recordingCanvas); requestAnimationFrame(renderLoop); } };
            const stream = recordingCanvas.captureStream(30);
            try {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
            } catch (e) {
                mediaRecorder = new MediaRecorder(stream);
            }
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                if (blob.size > 100) openSaveModal(blob, 'video');
            };
            isRecording = true;
            renderLoop();
            mediaRecorder.start(1000); // Graba fragmentos cada segundo para evitar el bug de 1KB
            recordBtn.classList.add('recording');
            recordBtn.querySelector('span').innerText = 'DETENER';
            recIndicator.classList.add('active');
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                recTimer.innerText = `${m}:${s}`;
            }, 1000);
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            mediaRecorder.stop();
            recordBtn.classList.remove('recording');
            recordBtn.querySelector('span').innerText = 'GRABAR';
            recIndicator.classList.remove('active');
            clearInterval(timerInterval);
        }

        // --- MODAL GUARDADO ---
        function openSaveModal(blob, type) {
            pendingBlob = blob; pendingType = type;
            const dateSuffix = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            filenameInput.value = `${type.toUpperCase()}_CCTV_${dateSuffix}`;
            saveModal.style.display = 'flex';
            filenameInput.focus();
        }

        document.getElementById('modal-save').onclick = () => {
            const fileName = filenameInput.value.trim() || "CCTV_FILE";
            const ext = pendingType === 'foto' ? '.jpg' : '.webm';
            const url = (typeof pendingBlob === 'string') ? pendingBlob : URL.createObjectURL(pendingBlob);
            const link = document.createElement('a');
            link.href = url; link.download = fileName + ext;
            link.click();
            saveModal.style.display = 'none';
        };

        document.getElementById('modal-cancel').onclick = () => saveModal.style.display = 'none';

        // --- INICIO DE CÁMARA ---
        async function startCamera(deviceId = null) {
            try {
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
                const constraints = {
                    video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "environment" }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                errorElement.style.display = 'none';
            } catch (err) {
                console.error("Cámara no iniciada:", err);
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
        
        window.onload = () => {
            startCamera();
            openConfig(); 
        };
        window.onresize = updateTransform;
    </script>
</body>
</html>
