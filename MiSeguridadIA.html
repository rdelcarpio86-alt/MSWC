<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Monitor - Grabación Corregida</title>
    <style>
        :root {
            --cctv-green: #00ff41;
            --cctv-red: #ff0000;
            --ui-bg: rgba(0, 0, 0, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: var(--cctv-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            text-transform: uppercase;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
        }

        video#webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.2) contrast(1.1) brightness(0.9);
            will-change: transform;
        }

        /* Capas de Efecto Visual */
        .noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 5;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.15) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 6;
        }

        /* Interfaz de Usuario */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            padding: 30px;
            box-sizing: border-box;
            z-index: 10;
        }

        .rec-status {
            position: absolute;
            top: 30px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            display: none;
        }

        .rec-status.active {
            display: flex;
        }

        .dot {
            width: 15px;
            height: 15px;
            background-color: var(--cctv-red);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        .timestamp {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 1.2rem;
            text-shadow: 2px 2px 2px #000;
            text-align: right;
        }

        /* Controles */
        .controls-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: var(--ui-bg);
            padding: 12px 25px;
            border: 1px solid var(--cctv-green);
            border-radius: 50px;
            z-index: 20;
            pointer-events: all;
            backdrop-filter: blur(8px);
        }

        .control-btn {
            background: transparent;
            border: 1px solid var(--cctv-green);
            color: var(--cctv-green);
            padding: 8px 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border-radius: 20px;
        }

        .control-btn:hover {
            background: var(--cctv-green);
            color: #000;
        }

        .control-btn.recording {
            border-color: var(--cctv-red);
            color: var(--cctv-red);
            animation: pulse-border 1.5s infinite;
        }

        /* Modal para elegir nombre */
        #save-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--ui-bg);
            border: 2px solid var(--cctv-green);
            padding: 25px;
            z-index: 200;
            display: none;
            flex-direction: column;
            gap: 15px;
            min-width: 320px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
            backdrop-filter: blur(15px);
        }

        #save-modal input {
            background: #000;
            border: 1px solid var(--cctv-green);
            color: var(--cctv-green);
            padding: 12px;
            font-family: inherit;
            outline: none;
            font-size: 1rem;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px rgba(255, 0, 0, 0.4); }
            100% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
        }

        #flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.15s ease-out;
        }

        .error-msg {
            position: absolute;
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border: 2px solid var(--cctv-red);
            color: var(--cctv-red);
            display: none;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        
        <div id="flash"></div>
        <div class="noise"></div>
        <div class="scanlines"></div>

        <div class="overlay">
            <div id="rec-indicator" class="rec-status">
                <div class="dot"></div>
                <span>REC <span id="rec-timer">00:00</span></span>
            </div>
            
            <div id="clock" class="timestamp">
                00/00/0000<br>00:00:00
            </div>
        </div>

        <div class="controls-panel">
            <button id="snap-btn" class="control-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
                FOTO
            </button>
            <button id="record-btn" class="control-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="3" fill="currentColor"/>
                </svg>
                <span>GRABAR</span>
            </button>
        </div>

        <!-- Modal de Guardado -->
        <div id="save-modal">
            <div id="modal-title" style="font-weight: bold; letter-spacing: 2px;">GUARDAR ARCHIVO</div>
            <input type="text" id="filename-input" placeholder="Nombre del archivo...">
            <div class="modal-buttons">
                <button class="control-btn" id="modal-cancel">DESCARTAR</button>
                <button class="control-btn" id="modal-save">DESCARGAR</button>
            </div>
        </div>

        <div id="error" class="error-msg">
            <div style="font-size: 1.5rem; margin-bottom: 10px;">⚠️ ERROR DE SISTEMA ⚠️</div>
            <p>CONEXIÓN CON LA CÁMARA FALLIDA O PERMISO DENEGADO.</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const clockElement = document.getElementById('clock');
        const errorElement = document.getElementById('error');
        const container = document.getElementById('container');
        const flash = document.getElementById('flash');
        const recordBtn = document.getElementById('record-btn');
        const snapBtn = document.getElementById('snap-btn');
        const recIndicator = document.getElementById('rec-indicator');
        const recTimer = document.getElementById('rec-timer');
        
        const saveModal = document.getElementById('save-modal');
        const filenameInput = document.getElementById('filename-input');
        const modalSaveBtn = document.getElementById('modal-save');
        const modalCancelBtn = document.getElementById('modal-cancel');
        const modalTitle = document.getElementById('modal-title');

        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let startTime;
        let timerInterval;
        let pendingBlob = null;
        let pendingType = ''; 

        // Estado de Transformación
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let lastMouseX, lastMouseY;

        // --- RELOJ ---
        function getFormattedTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('es-ES', { hour12: false });
            return { dateStr, timeStr };
        }

        function updateClock() {
            const time = getFormattedTime();
            clockElement.innerHTML = `${time.dateStr}<br>${time.timeStr}`;
        }

        // --- LÓGICA DE TRANSFORMACIÓN ---
        function updateTransform() {
            const containerW = container.clientWidth;
            const containerH = container.clientHeight;
            const maxOffX = (containerW * (scale - 1)) / 2;
            const maxOffY = (containerH * (scale - 1)) / 2;
            offsetX = Math.max(-maxOffX, Math.min(maxOffX, offsetX));
            offsetY = Math.max(-maxOffY, Math.min(maxOffY, offsetY));
            video.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        }

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSpeed = 0.25;
            const oldScale = scale;
            if (e.deltaY < 0) scale = Math.min(scale + zoomSpeed, 10);
            else scale = Math.max(1, scale - zoomSpeed);

            if (scale !== oldScale) {
                const rect = container.getBoundingClientRect();
                const mouseX = e.clientX - rect.left - rect.width / 2;
                const mouseY = e.clientY - rect.top - rect.height / 2;
                const ratio = (scale / oldScale) - 1;
                offsetX -= (mouseX - offsetX) * ratio;
                offsetY -= (mouseY - offsetY) * ratio;
                if (scale === 1) { offsetX = 0; offsetY = 0; }
                updateTransform();
            }
        }, { passive: false });

        container.addEventListener('mousedown', (e) => {
            if (scale > 1) {
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                container.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            offsetX += (e.clientX - lastMouseX);
            offsetY += (e.clientY - lastMouseY);
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'crosshair';
        });

        // --- DIBUJO PROCESADO ---
        function drawToCanvas(targetCanvas) {
            const ctx = targetCanvas.getContext('2d', { alpha: false });
            const cw = targetCanvas.width;
            const ch = targetCanvas.height;
            
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, cw, ch);
            
            ctx.save();
            ctx.translate(cw / 2, ch / 2);
            const ratio = cw / container.clientWidth;
            ctx.translate(offsetX * ratio, offsetY * ratio);
            ctx.scale(scale, scale);
            ctx.translate(-cw / 2, -ch / 2);
            
            const videoRatio = video.videoWidth / video.videoHeight;
            const canvasRatio = cw / ch;
            let drawW, drawH, drawX, drawY;
            if (videoRatio > canvasRatio) {
                drawH = ch; drawW = ch * videoRatio;
                drawX = (cw - drawW) / 2; drawY = 0;
            } else {
                drawW = cw; drawH = cw / videoRatio;
                drawX = 0; drawY = (ch - drawH) / 2;
            }
            ctx.drawImage(video, drawX, drawY, drawW, drawH);
            ctx.restore();

            // Sello de tiempo
            const time = getFormattedTime();
            const padding = cw * 0.03;
            const fontSize = Math.max(20, Math.floor(cw * 0.025));
            
            ctx.font = `bold ${fontSize}px "Courier New", monospace`;
            ctx.fillStyle = "#00ff41";
            ctx.textAlign = "right";
            
            ctx.shadowColor = "black";
            ctx.shadowBlur = 6;
            ctx.fillText(time.dateStr, cw - padding, padding + fontSize);
            ctx.fillText(time.timeStr, cw - padding, padding + fontSize * 2.2);
            
            ctx.textAlign = "left";
            ctx.fillText("CAM-01 ACTIVE", padding, padding + fontSize);
            ctx.shadowBlur = 0;
        }

        // --- GESTIÓN DE GUARDADO ---
        function openSaveModal(blob, type) {
            pendingBlob = blob;
            pendingType = type;
            const now = new Date();
            const dateSuffix = now.toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const defaultName = `${type.toUpperCase()}_CCTV_${dateSuffix}`;
            filenameInput.value = defaultName;
            modalTitle.innerText = `NUEVA ${type.toUpperCase()}`;
            saveModal.style.display = 'flex';
            filenameInput.focus();
            filenameInput.select();
        }

        modalSaveBtn.onclick = () => {
            if (!pendingBlob) return;
            const fileName = filenameInput.value.trim() || "CCTV_FILE";
            // Usamos .webm para video porque es el formato más seguro desde Canvas
            const extension = pendingType === 'foto' ? '.jpg' : '.webm';
            
            const url = (typeof pendingBlob === 'string') ? pendingBlob : URL.createObjectURL(pendingBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName + extension;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            closeModal();
        };

        modalCancelBtn.onclick = closeModal;

        function closeModal() {
            saveModal.style.display = 'none';
            if (pendingBlob && typeof pendingBlob !== 'string') {
                URL.revokeObjectURL(pendingBlob);
            }
            pendingBlob = null;
            filenameInput.value = '';
        }

        // --- ACCIONES ---
        snapBtn.onclick = () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1920;
            canvas.height = video.videoHeight || 1080;
            drawToCanvas(canvas);
            
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 150);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            openSaveModal(dataUrl, 'foto');
        };

        recordBtn.onclick = () => {
            if (!isRecording) startRecording();
            else stopRecording();
        };

        function startRecording() {
            recordedChunks = [];
            const recordingCanvas = document.createElement('canvas');
            recordingCanvas.width = video.videoWidth || 1280;
            recordingCanvas.height = video.videoHeight || 720;

            // Bucle de renderizado intenso para asegurar captura
            const renderLoop = () => {
                if (isRecording) {
                    drawToCanvas(recordingCanvas);
                    requestAnimationFrame(renderLoop);
                }
            };

            // Capturar stream del canvas a 30 FPS
            const stream = recordingCanvas.captureStream(30);
            
            // Configuración de MediaRecorder (WebM es lo más estable para Canvas)
            const options = { 
                mimeType: 'video/webm;codecs=vp8,opus',
                videoBitsPerSecond: 5000000 // 5Mbps para buena calidad
            };
            
            try {
                mediaRecorder = new MediaRecorder(stream, options);
            } catch (e) {
                console.warn("VP8 no soportado, intentando WebM genérico");
                mediaRecorder = new MediaRecorder(stream);
            }

            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) {
                    recordedChunks.push(e.data);
                }
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                if (blob.size > 100) { // Validar que tenga contenido
                    openSaveModal(blob, 'video');
                } else {
                    alert("Error: La grabación falló (archivo vacío). Intenta de nuevo.");
                }
            };

            // Iniciar procesos
            isRecording = true;
            renderLoop();
            mediaRecorder.start(1000); // Recoger datos cada segundo

            recordBtn.classList.add('recording');
            recordBtn.querySelector('span').innerText = 'DETENER';
            recIndicator.classList.add('active');
            
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                recTimer.innerText = `${m}:${s}`;
            }, 1000);
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            mediaRecorder.stop();
            
            recordBtn.classList.remove('recording');
            recordBtn.querySelector('span').innerText = 'GRABAR';
            recIndicator.classList.remove('active');
            clearInterval(timerInterval);
        }

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1920 }, 
                        height: { ideal: 1080 }, 
                        facingMode: "environment" 
                    } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => updateTransform();
            } catch (err) {
                console.error(err);
                errorElement.style.display = 'block';
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
        window.onload = init;
        window.onresize = updateTransform;
    </script>
</body>
</html>
